packages:
  - examples/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  zod: ^4.4.3
  "@types/react": ^19.2.14
  react: ^19.2.6
  react-dom: ^19.2.6
  "@types/react-dom": ^19.2.3
  "@tailwindcss/vite": ^4.3.0
  "@vitejs/plugin-vue": ^6.0.6
  "@sveltejs/vite-plugin-svelte": ^7.1.2
  "@analogjs/vite-plugin-angular": ^2.5.0
  "@angular/build": ^21.2.10
  "@angular/common": ^21.2.12
  "@angular/compiler": ^21.2.12
  "@angular/compiler-cli": ^21.2.12
  "@angular/core": ^21.2.12
  "@angular/forms": ^21.2.12
  "@angular/platform-browser": ^21.2.12
  "@angular/platform-server": ^21.2.12
  "@vue/server-renderer": ^3.5.26
  svelte: ^5.55.5
  tailwindcss: ^4.3.0
  tw-animate-css: ^1.4.0
  vue: ^3.5.26
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  "@radix-ui/react-slot": ^1.2.4
  lucide-react: ^1.14.0
  "@radix-ui/react-checkbox": ^1.3.3
  "@radix-ui/react-dialog": ^1.1.15
  tslib: ^2.8.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  lmdb: false
  msgpackr-extract: false
