packages:
  - examples/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  zod: ^4.4.3
  "@types/react": ^19.2.14
  react: ^19.2.6
  react-dom: ^19.2.6
  "@types/react-dom": ^19.2.3
  "@tailwindcss/vite": ^4.3.0
  tailwindcss: ^4.3.0
  tw-animate-css: ^1.4.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  "@radix-ui/react-slot": ^1.2.4
  lucide-react: ^1.14.0
  "@radix-ui/react-checkbox": ^1.3.3
  "@radix-ui/react-dialog": ^1.1.15
  tslib: ^2.8.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
